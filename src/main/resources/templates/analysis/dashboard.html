<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>案件分析ダッシュボード</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.card {
    border: 1px solid #ddd;
    padding: 15px;
    width: 300px;
    margin-bottom: 15px;
}

table {
    border-collapse: collapse;
    width: 500px;
    margin-bottom: 30px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background-color: #f2f2f2;
}
</style>

</head>
<body>

<h1>案件分析ダッシュボード</h1>

<div class="card">
    <h3>総案件数</h3>
    <p th:text="${analysis.totalCount}"></p>
</div>

<div class="card">
    <h3>平均月単価</h3>
    <p th:text="${analysis.averageUnitPrice}"></p>
</div>

<div class="card">
    <h3>最高月単価</h3>
    <p th:text="${analysis.maxUnitPrice}"></p>
</div>

<div class="card">
    <h3>最低月単価</h3>
    <p th:text="${analysis.minUnitPrice}"></p>
</div>

<h2>80万円以上案件分析</h2>

<div class="card">
    <h3>80万円以上案件数</h3>
    <p th:text="${analysis.highPriceCount}"></p>
</div>

<div class="card">
    <h3>80万円以上案件 平均月単価</h3>
    <p th:text="${analysis.highPriceAverageUnitPrice}"></p>
</div>

<div class="card">
    <h3>80万円以上案件 最高月単価</h3>
    <p th:text="${analysis.highPriceMaxUnitPrice}"></p>
</div>

<div class="card">
    <h3>80万円以上案件 最低月単価</h3>
    <p th:text="${analysis.highPriceMinUnitPrice}"></p>
</div>

<h2>言語ランキング</h2>

<table>
    <thead>
        <tr>
            <th>言語</th>
            <th>件数</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="entry : ${analysis.languageRanking}">
            <td th:text="${entry.key}"></td>
            <td th:text="${entry.value} + '件'"></td>
        </tr>
    </tbody>
</table>

<h2>フレームワークランキング</h2>

<table>
    <thead>
        <tr>
            <th>フレームワーク</th>
            <th>件数</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="entry : ${analysis.frameworkRanking}">
            <td th:text="${entry.key}"></td>
            <td th:text="${entry.value} + '件'"></td>
        </tr>
    </tbody>
</table>

<h2>必須スキルランキング</h2>

<table>
    <thead>
        <tr>
            <th>必須スキル</th>
            <th>件数</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="entry : ${analysis.requiredSkillRanking}">
            <td th:text="${entry.key}"></td>
            <td th:text="${entry.value} + '件'"></td>
        </tr>
    </tbody>
</table>

<a th:href="@{/projects}">
    一覧へ戻る
</a>

</body>
</html>
