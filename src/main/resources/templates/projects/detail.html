<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>案件詳細</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.detail-table {
    border-collapse: collapse;
    width: 700px;
}

.detail-table th,
.detail-table td {
    border: 1px solid #ddd;
    padding: 10px;
}

.detail-table th {
    width: 180px;
    background-color: #f2f2f2;
    text-align: left;
}

.back-link {
    display: inline-block;
    margin-top: 20px;
}

.multiline {
    white-space: pre-wrap;
}
</style>

</head>
<body>

<h1>案件詳細</h1>

<table class="detail-table">
    <tr>
        <th>ID</th>
        <td th:text="${project.id}"></td>
    </tr>
    <tr>
        <th>案件名</th>
        <td th:text="${project.title}"></td>
    </tr>
    <tr>
        <th>言語</th>
        <td th:text="${project.language}"></td>
    </tr>
    <tr>
        <th>フレームワーク</th>
        <td th:text="${project.framework}"></td>
    </tr>
    <tr>
        <th>業界</th>
        <td th:text="${project.industry}"></td>
    </tr>
    <tr>
        <th>役割</th>
        <td th:text="${project.role}"></td>
    </tr>
    <tr>
        <th>案件概要</th>
        <td class="multiline" th:text="${project.description}"></td>
    </tr>
    <tr>
    <th>必須スキル</th>
        <td class="multiline" th:text="${project.requiredSkills}"></td>
    </tr>
    <tr>
        <th>月単価</th>
        <td th:text="${project.unitPrice}"></td>
    </tr>
</table>

<a th:href="@{/projects/{id}/edit(id=${project.id})}">
    編集
</a>

<form th:action="@{/projects/{id}/delete(id=${project.id})}"
      method="post"
      style="display:inline;">

    <button type="submit"
            onclick="return confirm('本当に削除しますか？');">
        削除
    </button>

</form>

<br>

<a th:href="@{/projects}" class="back-link">一覧へ戻る</a>

</body>
</html>
