<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>案件編集</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: inline-block;
    width: 150px;
    font-weight: bold;
    vertical-align: top;
    padding-top: 10px;
}

input {
    width: 300px;
    padding: 5px;
}

button {
    padding: 8px 16px;
}

.back-link {
    margin-left: 10px;
}

textarea {
    width: 600px;
    min-height: 120px;
    padding: 8px;
    resize: vertical;
}
</style>

</head>
<body>

<h1>案件編集</h1>

<form th:action="@{/projects/{id}/edit(id=${freelanceProject.id})}"
      th:object="${freelanceProject}"
      method="post">

    <div class="form-group">
        <label>案件名</label>
        <input type="text" th:field="*{title}">
    </div>

    <div class="form-group">
        <label>言語</label>
        <input type="text" th:field="*{language}">
    </div>

    <div class="form-group">
        <label>フレームワーク</label>
        <input type="text" th:field="*{framework}">
    </div>

    <div class="form-group">
        <label>業界</label>
        <input type="text" th:field="*{industry}">
    </div>

    <div class="form-group">
        <label>役割</label>
        <input type="text" th:field="*{role}">
    </div>

    <div class="form-group">
        <label>案件概要</label>
        <textarea
            th:field="*{description}"
            rows="5"
            cols="50">
        </textarea>
    </div>

    <div class="form-group">
        <label>必須スキル</label>
        <textarea
            th:field="*{requiredSkills}"
            rows="5">
        </textarea>
    </div>

    <div class="form-group">
        <label>歓迎スキル</label>
        <textarea
            th:field="*{preferredSkills}"
            rows="5">
        </textarea>
    </div>

    <div class="form-group">
        <label>月単価</label>
        <input type="number" th:field="*{unitPrice}">
    </div>

    <div class="form-group">
        <label>情報取得元</label>
        <input type="text" th:field="*{sourceName}" placeholder="レバテックフリーランス">
    </div>

    <div class="form-group">
        <label>情報取得元URL</label>
        <input type="text" th:field="*{sourceUrl}" placeholder="https://...">
    </div>

    <button type="submit">更新</button>

    <a th:href="@{/projects/{id}(id=${freelanceProject.id})}" class="back-link">
        詳細へ戻る
    </a>

</form>

</body>
</html>
