<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>案件登録</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: inline-block;
    width: 150px;
    font-weight: bold;
}

input {
    width: 300px;
    padding: 5px;
}

button {
    padding: 8px 16px;
}

.back-link {
    margin-left: 10px;
}
</style>

</head>
<body>

<h1>案件登録</h1>

<form th:action="@{/projects}" th:object="${freelanceProject}" method="post">

    <div class="form-group">
        <label>案件名</label>
        <input type="text" th:field="*{title}">
    </div>

    <div class="form-group">
        <label>言語</label>
        <input type="text" th:field="*{language}">
    </div>

    <div class="form-group">
        <label>フレームワーク</label>
        <input type="text" th:field="*{framework}">
    </div>

    <div class="form-group">
        <label>業界</label>
        <input type="text" th:field="*{industry}">
    </div>

    <div class="form-group">
        <label>役割</label>
        <input type="text" th:field="*{role}">
    </div>

    <div class="form-group">
        <label>案件概要</label>
        <input type="text" th:field="*{description}">
    </div>

    <div class="form-group">
        <label>月単価</label>
        <input type="number" th:field="*{unitPrice}">
    </div>

    <button type="submit">登録</button>

    <a th:href="@{/projects}" class="back-link">
        一覧へ戻る
    </a>

</form>

</body>
</html>
