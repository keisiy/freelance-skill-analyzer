<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>案件一覧</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

th {
    background-color: #f2f2f2;
}

h1 {
    margin-bottom: 20px;
}

.register-button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    margin-bottom: 20px;
}
</style>
</head>
<body>

<h1>案件一覧</h1>

<p>
    <a th:href="@{/projects/new}" class="register-button">
        新規登録
    </a>
</p>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>案件名</th>
            <th>言語</th>
            <th>フレームワーク</th>
            <th>月単価</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.id}"></td>
            <td>
                <a th:href="@{/projects/{id}(id=${project.id})}"
                    th:text="${project.title}">
                </a>
            </td>
            <td th:text="${project.language}"></td>
            <td th:text="${project.framework}"></td>
            <td th:text="${project.unitPrice}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
