<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>案件一覧</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

th {
    background-color: #f2f2f2;
}

h1 {
    margin-bottom: 20px;
}

.register-button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    margin-bottom: 20px;
}

.sort-button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #2196F3;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    margin-bottom: 20px;
    margin-left: 10px;
}
</style>
</head>
<body>

<h1>案件一覧</h1>

<form th:action="@{/projects/search}" method="get">

    <input
        type="text"
        name="language"
        placeholder="言語を入力"
        th:value="${language}"
    >

    <input
        type="text"
        name="framework"
        placeholder="フレームワークを入力"
        th:value="${framework}"
    >

    <button type="submit">
        検索
    </button>

    <a th:href="@{/projects}">検索クリア</a>

</form>

<br>

<p>
    <a th:href="@{/projects/new}" class="register-button">
        新規登録
    </a>
    <a th:href="@{/projects/sort/unit-price-desc}" class="sort-button">
        月単価高い順
    </a>
    <a th:href="@{/projects}" class="sort-button">
        通常一覧
    </a>
    <a th:href="@{/analysis}" class="sort-button">
        分析画面
    </a>
    <a th:href="@{/projects/high-price}" class="sort-button">
        80万円以上案件一覧
    </a>
    <a th:href="@{/projects/import}" class="sort-button">
        CSVインポート
    </a>
</p>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>案件名</th>
            <th>言語</th>
            <th>フレームワーク</th>
            <th>月単価</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.id}"></td>
            <td>
                <a th:href="@{/projects/{id}(id=${project.id})}"
                    th:text="${project.title}">
                </a>
            </td>
            <td th:text="${project.language}"></td>
            <td th:text="${project.framework}"></td>
            <td th:text="${project.unitPrice}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
